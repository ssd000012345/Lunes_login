name: Betadash Keepalive（每 5 天自动登录）

on:
  workflow_dispatch:
  schedule:
    # 每月 1/6/11/16/21/26 日 UTC 01:00 ≈ 每 5 天
    - cron: "0 1 1,6,11,16,21,26 * *"

jobs:
  keepalive:
    name: 登录 betadash.lunes.host 保活
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LUNES_EMAIL:     ${{ secrets.LUNES_EMAIL }}
      LUNES_PASSWORD:  ${{ secrets.LUNES_PASSWORD }}
      LUNES_SERVER_ID: ${{ secrets.LUNES_SERVER_ID }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装系统依赖（Chromium + Xvfb）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser xvfb

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 启动虚拟显示器并运行脚本
        # headless=False + Xvfb：完全模拟真实桌面浏览器，绕过 CF 指纹检测
        env:
          DISPLAY: ":99"
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1366x900x24 +extension RANDR &
          sleep 2
          timeout 600 python scripts/login.py
          EXIT_CODE=$?
          echo "脚本退出码: $EXIT_CODE"
          exit $EXIT_CODE

      - name: 上传截图（始终执行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-screenshots-${{ github.run_number }}
          path: screenshots/*.png
          if-no-files-found: ignore
          retention-days: 7

  cleanup:
    name: 清理旧工作流记录（保留 2 条）
    runs-on: ubuntu-latest
    needs: keepalive
    if: always()
    permissions:
      actions: write

    steps:
      - name: 删除多余的旧 runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
