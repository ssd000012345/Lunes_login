name: Betadash Keepalive（每 5 天自动登录）

on:
  workflow_dispatch:   # 支持手动触发
  schedule:
    # 每 5 天执行一次，UTC 01:00（北京时间 09:00）
    - cron: "0 1 1,6,11,16,21,26 * *"

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    name: 登录 betadash.lunes.host 保活
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LUNES_EMAIL:    ${{ secrets.LUNES_EMAIL }}
      LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖 & Playwright Chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: 执行登录脚本
        id: login
        run: |
          node -v && npm -v
          npm run login
        continue-on-error: true

      - name: 上传截图（始终执行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-screenshots-${{ github.run_number }}
          path: "*.png"
          if-no-files-found: ignore
          retention-days: 7

      - name: 若脚本失败则让 job 失败
        if: steps.login.outcome == 'failure'
        run: exit 1

  cleanup:
    name: 清理旧工作流记录（保留 2 条）
    runs-on: ubuntu-latest
    needs: keepalive
    if: always()
    permissions:
      actions: write

    steps:
      - name: 删除多余的旧 runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
